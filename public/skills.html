<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能库 - 龙虾技能库</title>
  <meta name="description" content="浏览1200+ AI Agent技能，按分类、平台筛选，发现最适合你的AI工具。">
  <link rel="canonical" href="https://lobsterskills.com/skills">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .filter-section {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      margin-bottom: 30px;
      box-shadow: var(--shadow-sm);
    }
    .filter-group {
      margin-bottom: 15px;
    }
    .filter-label {
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
    }
    .filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .filter-option {
      padding: 6px 14px;
      border: 2px solid var(--gray-light);
      border-radius: var(--radius-xl);
      background: white;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.9rem;
    }
    .filter-option:hover,
    .filter-option.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
    .sort-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px 20px;
      background: white;
      border-radius: var(--radius);
    }
    .results-count {
      color: var(--gray);
    }
    .sort-options {
      display: flex;
      gap: 15px;
    }
    .sort-option {
      color: var(--gray);
      cursor: pointer;
    }
    .sort-option.active {
      color: var(--primary);
      font-weight: 600;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 40px;
    }
    .page-btn {
      padding: 8px 16px;
      border: 2px solid var(--gray-light);
      border-radius: var(--radius);
      background: white;
      cursor: pointer;
      transition: var(--transition);
    }
    .page-btn:hover,
    .page-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <!-- 安全警告横幅 -->
  <div class="security-banner">
    <div class="container">
      <div class="security-content">
        <span class="security-icon">⚠️</span>
        <p><strong>安全提示：</strong>本站聚合的技能来自第三方平台，未经过独立安全验证。使用前请自行评估风险。</p>
        <button class="security-close" onclick="this.parentElement.parentElement.remove()">✕</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">
          <span class="logo-icon">🦞</span>
          <span class="logo-text">龙虾技能库</span>
        </a>
        <nav class="main-nav">
          <a href="/" class="nav-link">首页</a>
          <a href="/skills" class="nav-link active">技能库</a>
          <a href="/categories" class="nav-link">分类</a>
          <a href="/platforms" class="nav-link">平台</a>
        </nav>
        <div class="header-actions">
          <div class="search-box">
            <input type="text" placeholder="搜索技能..." id="searchInput">
            <button class="search-btn">🔍</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container" style="padding-top: 30px;">
    <h1 class="section-title">技能库</h1>
    
    <!-- 筛选栏 -->
    <div class="filter-section">
      <div class="filter-group">
        <span class="filter-label">分类</span>
        <div class="filter-options" id="categoryFilters">
          <span class="filter-option active" data-value="all">全部</span>
          <span class="filter-option" data-value="productivity">⚡ 效率工具</span>
          <span class="filter-option" data-value="writing">✍️ 写作辅助</span>
          <span class="filter-option" data-value="coding">💻 编程开发</span>
          <span class="filter-option" data-value="design">🎨 设计创意</span>
          <span class="filter-option" data-value="data">📊 数据分析</span>
          <span class="filter-option" data-value="marketing">📢 营销推广</span>
          <span class="filter-option" data-value="automation">🤖 自动化</span>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">平台</span>
        <div class="filter-options" id="platformFilters">
          <span class="filter-option active" data-value="all">全部</span>
          <span class="filter-option" data-value="openclaw">🦞 OpenClaw</span>
          <span class="filter-option" data-value="github">🐙 GitHub</span>
          <span class="filter-option" data-value="coze">🤖 Coze</span>
          <span class="filter-option" data-value="dify">🔧 Dify</span>
          <span class="filter-option" data-value="other">📦 其他</span>
        </div>
      </div>
    </div>

    <!-- 排序栏 -->
    <div class="sort-bar">
      <span class="results-count">共找到 <strong id="resultCount">1,247</strong> 个技能</span>
      <div class="sort-options">
        <span class="sort-option active" data-sort="popular">🔥 热门</span>
        <span class="sort-option" data-sort="newest">🆕 最新</span>
        <span class="sort-option" data-sort="rating">⭐ 评分</span>
        <span class="sort-option" data-sort="downloads">⬇️ 下载</span>
      </div>
    </div>

    <!-- 技能列表 -->
    <div class="skills-grid" id="skillsList">
      <!-- 动态生成 -->
    </div>

    <!-- 分页 -->
    <div class="pagination">
      <button class="page-btn">←</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">...</button>
      <button class="page-btn">42</button>
      <button class="page-btn">→</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" style="margin-top: 60px;">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 龙虾技能库. All rights reserved.</p>
        <p class="disclaimer">
          <span class="warning-icon">⚠️</span>
          本站聚合的技能来自第三方，未经过独立安全验证，使用风险自负。
        </p>
      </div>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    // 技能列表页面逻辑
    document.addEventListener('DOMContentLoaded', () => {
      // 渲染所有技能
      const skillsList = document.getElementById('skillsList');
      const allSkills = SkillsData.skills;
      
      skillsList.innerHTML = allSkills.map(skill => UIRenderer.renderSkillCard(skill)).join('');
      
      // 筛选功能
      const categoryFilters = document.querySelectorAll('#categoryFilters .filter-option');
      const platformFilters = document.querySelectorAll('#platformFilters .filter-option');
      
      categoryFilters.forEach(filter => {
        filter.addEventListener('click', () => {
          categoryFilters.forEach(f => f.classList.remove('active'));
          filter.classList.add('active');
          // 实际筛选逻辑
        });
      });
      
      platformFilters.forEach(filter => {
        filter.addEventListener('click', () => {
          platformFilters.forEach(f => f.classList.remove('active'));
          filter.classList.add('active');
          // 实际筛选逻辑
        });
      });
      
      // 排序功能
      const sortOptions = document.querySelectorAll('.sort-option');
      sortOptions.forEach(option => {
        option.addEventListener('click', () => {
          sortOptions.forEach(o => o.classList.remove('active'));
          option.classList.add('active');
          // 实际排序逻辑
        });
      });
    });
  </script>
</body>
</html>
